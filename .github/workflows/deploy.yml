name: Deploy NovaAI

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Inject secrets into config.js
        run: |
          sed -i \
            -e "s|%%SUPABASE_URL%%|${{ secrets.SUPABASE_URL }}|g" \
            -e "s|%%SUPABASE_ANON_KEY%%|${{ secrets.SUPABASE_ANON_KEY }}|g" \
            -e "s|%%NVIDIA_API_KEY%%|${{ secrets.NVIDIA_API_KEY }}|g" \
            -e "s|%%PROXY_URL%%|${{ secrets.PROXY_URL }}|g" \
            config.js
          echo "✅ Secrets injected into config.js"

      - name: Prepare deploy folder
        run: |
          mkdir -p _site
          cp index.html _site/
          cp style.css _site/
          cp config.js _site/
          cp app.js _site/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - uses: actions/deploy-pages@v4
        id: deploy
